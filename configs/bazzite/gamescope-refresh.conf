# Bazzite / gamescope refresh rate override
# GAMESCOPE_BIN: points gamescope-session-plus at a wrapper that adds -r 120
# so gamescope composites at 120Hz (nested refresh) regardless of EDID.
# CUSTOM_REFRESH_RATES: advertised rates in Steam UI dynamic refresh slider.
GAMESCOPE_BIN=/var/home/Og/bin/gamescope-wrapper
CUSTOM_REFRESH_RATES=60,90,120,144
