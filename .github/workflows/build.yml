name: Build GW2 Addons

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        module:
          - name: mystic-clicker
            vcxproj: mystic-clicker.vcxproj
          - name: mystic-trading
            vcxproj: mystic-trading.vcxproj
          - name: mystic-chatter
            vcxproj: mystic-chatter.vcxproj

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build ${{ matrix.module.name }}
        run: msbuild ${{ matrix.module.vcxproj }} /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143

      - name: Upload ${{ matrix.module.name }} DLL
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module.name }}
          path: bin/Release/${{ matrix.module.name }}.dll
