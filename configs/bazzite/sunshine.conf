# Explicit stream capabilities — ensures Moonlight clients see full range.
fps = [30, 60, 90, 120]
resolutions = [
    1280x720,
    1280x800,
    1920x1080,
    2560x1080,
    2560x1440,
    3840x2160
]

# Force H.264 for testing 4K@120 — HEVC Main Level 5.1 caps at 4K@60
# on Moonlight-tvOS, but H.264 Level 6.0 is more widely supported.
# Setting hevc_mode to 0 disables HEVC; client will use H.264.
hevc_mode = 0

# Use NVENC, realistic preset for low-latency streaming
encoder = nvenc
